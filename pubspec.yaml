name: saree3_app
description: منصة سريع - توصيل الطرود الخفيفة عبر الدراجات الهوائية
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # share_plus: ^7.2.2

  flutter_localizations:  
    sdk: flutter

  # إدارة الحالة
  provider: ^6.0.0
  
  # التخزين المحلي
  shared_preferences: ^2.0.0
  
  # أدوات مساعدة
  intl: ^0.20.2  # ✅ غير الإصدار من 0.18.0 إلى 0.20.2

  image_picker: ^1.0.0
  path_provider: ^2.1.2   # ← أضف هذا
  path_provider_android: 2.2.12

#  firebase pacges
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600